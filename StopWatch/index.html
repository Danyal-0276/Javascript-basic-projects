<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>StopWatch Using JavaScript</title>
</head>
<body>

    <div class="stopwatch">
        <h1 id="display-Time">00:00:00</h1>
        <div class="buttons">
            <img src="images/stop.png" onclick="watchStop()" alt="">
            <img src="images/start.png" onclick="watchStart()" alt="">
            <img src="images/reset.png" onclick="watchReset()" alt="">
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
